<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="DINOv2-GraphNAV — navigate from a feature graph">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy="0" r="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".28"/>
      <stop offset=".65" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity=".05"/>
    </pattern>
    <clipPath id="frame"><rect width="1200" height="300" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="#0a0e19"/>
    <rect width="1200" height="300" fill="url(#dots)"/>
    <ellipse cx="600" cy="-40" rx="700" ry="250" fill="url(#glow)"/>

    <g transform="translate(72,0)">
      <rect x="0" y="74" width="150" height="26" rx="13" fill="none" stroke="#67e8f9" stroke-opacity=".5"/>
      <text x="75" y="91" text-anchor="middle" font-family="ui-monospace,'Cascadia Code',Consolas,monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#67e8f9">VISUAL NAVIGATION</text>
      <text x="0" y="162" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="800" fill="#e8ecf4">Navigate from a</text>
      <text x="0" y="212" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="800" fill="url(#acc)">feature graph.</text>
      <text x="2" y="250" font-family="ui-monospace,'Cascadia Code',Consolas,monospace" font-size="13" fill="#8a94a8">DINOv2 &#183; FAISS &#183; A*/Dijkstra</text>
    </g>

    <!-- topological graph with a highlighted shortest path -->
    <g transform="translate(820,60)" stroke-linecap="round">
      <!-- edges -->
      <g stroke="#ffffff" stroke-opacity=".16" stroke-width="1.5">
        <line x1="40" y1="40" x2="150" y2="20"/>
        <line x1="150" y1="20" x2="250" y2="80"/>
        <line x1="40" y1="40" x2="90" y2="130"/>
        <line x1="90" y1="130" x2="200" y2="150"/>
        <line x1="250" y1="80" x2="200" y2="150"/>
        <line x1="200" y1="150" x2="300" y2="180"/>
        <line x1="90" y1="130" x2="60" y2="180"/>
        <line x1="150" y1="20" x2="250" y2="80"/>
      </g>
      <!-- highlighted route -->
      <g stroke="url(#acc)" stroke-width="3">
        <line x1="40" y1="40" x2="90" y2="130"/>
        <line x1="90" y1="130" x2="200" y2="150"/>
        <line x1="200" y1="150" x2="300" y2="180"/>
      </g>
      <!-- nodes -->
      <g fill="#101728" stroke="#ffffff" stroke-opacity=".22" stroke-width="1.5">
        <circle cx="150" cy="20" r="7"/>
        <circle cx="250" cy="80" r="7"/>
        <circle cx="60" cy="180" r="7"/>
      </g>
      <!-- route nodes -->
      <circle cx="40" cy="40" r="9" fill="#a5b4fc"/>
      <circle cx="90" cy="130" r="7" fill="#67e8f9"/>
      <circle cx="200" cy="150" r="7" fill="#67e8f9"/>
      <circle cx="300" cy="180" r="10" fill="none" stroke="#67e8f9" stroke-width="2.5"/>
      <circle cx="300" cy="180" r="4" fill="#67e8f9"/>
    </g>
  </g>

  <rect x=".5" y=".5" width="1199" height="299" rx="18" fill="none" stroke="url(#acc)" stroke-opacity=".35"/>
</svg>
